name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017

    env:
      HUSKY: 0
      PINO_LOG_LEVEL: silent

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run unit and contract tests
        run: npm test

      - name: Validate Postman package
        run: npm run postman:validate

      - name: Run MongoDB integration tests
        run: npm run test:integration
        env:
          TEST_MONGODB_URI: mongodb://127.0.0.1:27017/creator-card-ci

      - name: Audit dependencies
        run: npm audit
